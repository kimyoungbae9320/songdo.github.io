<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc-Length Method 시뮬레이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        label {
            font-weight: 600;
            color: #444;
            font-size: 0.9em;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-step {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .canvas-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        canvas {
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            width: 100%;
            height: auto;
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-item {
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .info-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 30px;
            height: 3px;
            border-radius: 2px;
        }

        .method-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .canvas-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ Arc-Length Method 시뮬레이션</h1>
        <p class="subtitle">비선형 구조 해석 - Crisfield 방법을 이용한 Snap-Through 현상 추적</p>
        
        <div style="text-align: center;">
            <span class="method-badge">📐 Arc-Length Method (Crisfield)</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Arc Length (ΔS): <span id="arcLengthValue">0.1</span></label>
                <input type="range" id="arcLength" min="0.01" max="0.5" step="0.01" value="0.1">
            </div>
            
            <div class="control-group">
                <label>강성 비선형성 (k): <span id="stiffnessValue">10</span></label>
                <input type="range" id="stiffness" min="1" max="50" step="1" value="10">
            </div>
            
            <div class="control-group">
                <label>최대 반복 횟수: <span id="maxIterValue">20</span></label>
                <input type="range" id="maxIter" min="5" max="50" step="1" value="20">
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn-start" onclick="startAnalysis()">▶ 해석 시작</button>
            <button class="btn-step" onclick="stepAnalysis()">→ 단계별 실행</button>
            <button class="btn-reset" onclick="resetAnalysis()">↻ 초기화</button>
        </div>
        
        <div class="canvas-container">
            <div>
                <canvas id="equilibriumCanvas" width="600" height="500"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #e0e0e0; width: 40px;"></div>
                        <span>이론 평형 경로</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #667eea; width: 40px;"></div>
                        <span>Arc-Length 경로</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f5576c; width: 40px;"></div>
                        <span>현재 상태</span>
                    </div>
                </div>
            </div>
            <div>
                <canvas id="structureCanvas" width="600" height="500"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ddd; width: 40px;"></div>
                        <span>초기 형상</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #667eea; width: 40px;"></div>
                        <span>변형 형상</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-item">
                <div class="info-label">현재 Step</div>
                <div class="info-value" id="currentStep">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">변위 (u)</div>
                <div class="info-value" id="currentU">0.000</div>
            </div>
            <div class="info-item">
                <div class="info-label">하중 계수 (λ)</div>
                <div class="info-value" id="currentLambda">0.000</div>
            </div>
            <div class="info-item">
                <div class="info-label">반복 횟수</div>
                <div class="info-value" id="iterations">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">잔차 (Residual)</div>
                <div class="info-value" id="residual">0.000</div>
            </div>
            <div class="info-item">
                <div class="info-label">수렴 상태</div>
                <div class="info-value" id="convergence">대기 중</div>
            </div>
        </div>
    </div>

    <script>
        // 캔버스 설정
        const eqCanvas = document.getElementById('equilibriumCanvas');
        const eqCtx = eqCanvas.getContext('2d');
        const strCanvas = document.getElementById('structureCanvas');
        const strCtx = strCanvas.getContext('2d');
        
        // 시뮬레이션 변수
        let solutionPath = [];
        let currentState = { u: 0, lambda: 0, step: 0 };
        let isRunning = false;
        let animationId = null;
        
        // 파라미터
        let params = {
            arcLength: 0.1,
            stiffness: 10,
            maxIter: 20,
            tolerance: 1e-6
        };
        
        // 이벤트 리스너
        document.getElementById('arcLength').addEventListener('input', (e) => {
            params.arcLength = parseFloat(e.target.value);
            document.getElementById('arcLengthValue').textContent = e.target.value;
        });
        
        document.getElementById('stiffness').addEventListener('input', (e) => {
            params.stiffness = parseFloat(e.target.value);
            document.getElementById('stiffnessValue').textContent = e.target.value;
            resetAnalysis();
        });
        
        document.getElementById('maxIter').addEventListener('input', (e) => {
            params.maxIter = parseInt(e.target.value);
            document.getElementById('maxIterValue').textContent = e.target.value;
        });
        
        // 비선형 내부력 함수 (Snap-through 모델)
        // R_int = k * u - k * 0.1 * u^3
        function internalForce(u, k) {
            return k * u - k * 0.1 * Math.pow(u, 3);
        }
        
        // 탄젠트 강성 dR_int/du
        function tangentStiffness(u, k) {
            return k - 3 * k * 0.1 * Math.pow(u, 2);
        }
        
        // 잔차 계산 R = R_int(u) - λF
        function residual(u, lambda, F = 1.0) {
            return internalForce(u, params.stiffness) - lambda * F;
        }
        
        // Arc-Length Method (Crisfield)
        // 평형식: {R_int(u)} - λ{F} = 0
        // 제약식: Δu^T·Δu + Δλ^2 = ΔS^2 (하이퍼구면)
        function solveArcLength(u0, lambda0, ds) {
            let u = u0;
            let lambda = lambda0;
            const F = 1.0;
            
            // ========================================
            // 1단계: Predictor (초기 예측)
            // ========================================
            // 탄젠트 강성 계산: K_T = dR_int/du
            const Kt = tangentStiffness(u, params.stiffness);
            if (Math.abs(Kt) < 1e-10) return null;
            
            // 평형식 미분: -K_T·u̇ + λ̇·F = 0
            // → u̇ = λ̇ · (F/K_T) = λ̇ · Δu_F
            const du_F = F / Kt;
            
            // 아크 길이 조건: u̇^T·u̇ + λ̇^2 = 1
            // → λ̇^2(Δu_F^T·Δu_F + 1) = 1
            const normalizer = Math.sqrt(du_F * du_F + 1);
            
            // 접선 방향 계산 (단위 접선 벡터)
            let du = (ds / normalizer) * du_F;
            let dlambda = (ds / normalizer);
            
            // 방향 결정 (이전 증분 방향 유지)
            if (solutionPath.length > 1) {
                const prev = solutionPath[solutionPath.length - 1];
                const prev2 = solutionPath[solutionPath.length - 2];
                const prevDir_u = prev.u - prev2.u;
                const prevDir_lambda = prev.lambda - prev2.lambda;
                
                // 내적이 음수면 반대 방향
                if (du * prevDir_u + dlambda * prevDir_lambda < 0) {
                    du = -du;
                    dlambda = -dlambda;
                }
            }
            
            // 초기 예측값
            u += du;
            lambda += dlambda;
            
            // ========================================
            // 2단계: Corrector (Newton-Raphson 반복)
            // ========================================
            let iter = 0;
            let converged = false;
            let res = 0;
            
            while (iter < params.maxIter && !converged) {
                // 잔차 계산: R = R_int(u) - λ·F
                res = residual(u, lambda, F);
                
                // 수렴 확인
                if (Math.abs(res) < params.tolerance) {
                    converged = true;
                    break;
                }
                
                // 현재 상태에서 탄젠트 강성
                const Kt_current = tangentStiffness(u, params.stiffness);
                if (Math.abs(Kt_current) < 1e-10) break;
                
                const du_F_current = F / Kt_current;
                
                // ========================================
                // Arc-length 제약식을 고려한 2차 방정식
                // ========================================
                // 제약: (u + δu - u0)^2 + (λ + δλ - λ0)^2 = ds^2
                // δu = du_F·δλ - R/K_T (Newton 증분)
                // 이를 대입하면 δλ에 대한 2차 방정식:
                // a·δλ^2 + b·δλ + c = 0
                
                const du_total = u - u0;
                const dlambda_total = lambda - lambda0;
                
                const a = du_F_current * du_F_current + 1;
                const b = 2 * (du_F_current * du_total - res * du_F_current / Kt_current + dlambda_total);
                const c = du_total * du_total + dlambda_total * dlambda_total - ds * ds;
                
                const discriminant = b * b - 4 * a * c;
                
                // 실근이 존재하지 않으면 실패
                if (discriminant < 0) break;
                
                // 2차 방정식의 두 해
                const delta_lambda1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                const delta_lambda2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                
                // 더 작은 증분 선택 (안정성)
                const delta_lambda = Math.abs(delta_lambda1) < Math.abs(delta_lambda2) ? 
                                     delta_lambda1 : delta_lambda2;
                
                // 변위 증분 계산
                const delta_u = du_F_current * delta_lambda - res / Kt_current;
                
                // 상태 업데이트
                u += delta_u;
                lambda += delta_lambda;
                iter++;
            }
            
            return {
                u: u,
                lambda: lambda,
                converged: converged,
                iterations: iter,
                residual: Math.abs(res)
            };
        }
        
        // 한 스텝 진행
        function stepAnalysis() {
            const result = solveArcLength(currentState.u, currentState.lambda, params.arcLength);
            
            if (result && result.converged) {
                currentState.u = result.u;
                currentState.lambda = result.lambda;
                currentState.step++;
                
                solutionPath.push({
                    u: result.u,
                    lambda: result.lambda,
                    step: currentState.step
                });
                
                updateInfo(result);
                drawCharts();
                
                return true;
            } else {
                updateInfo(result || { converged: false, iterations: params.maxIter, residual: Infinity });
                return false;
            }
        }
        
        // 연속 해석
        function startAnalysis() {
            if (isRunning) {
                isRunning = false;
                return;
            }
            
            isRunning = true;
            const maxSteps = 100;
            
            function runStep() {
                if (!isRunning || currentState.step >= maxSteps) {
                    isRunning = false;
                    return;
                }
                
                const success = stepAnalysis();
                
                // λ < 3.0 범위 내에서만 진행
                if (success && Math.abs(currentState.lambda) < 3.0) {
                    animationId = setTimeout(runStep, 100);
                } else {
                    isRunning = false;
                }
            }
            
            runStep();
        }
        
        // 초기화
        function resetAnalysis() {
            isRunning = false;
            if (animationId) clearTimeout(animationId);
            
            currentState = { u: 0, lambda: 0, step: 0 };
            solutionPath = [{ u: 0, lambda: 0, step: 0 }];
            
            updateInfo({ converged: false, iterations: 0, residual: 0 });
            drawCharts();
        }
        
        // 정보 업데이트
        function updateInfo(result) {
            document.getElementById('currentStep').textContent = currentState.step;
            document.getElementById('currentU').textContent = currentState.u.toFixed(3);
            document.getElementById('currentLambda').textContent = currentState.lambda.toFixed(3);
            document.getElementById('iterations').textContent = result.iterations || 0;
            document.getElementById('residual').textContent = (result.residual || 0).toExponential(2);
            document.getElementById('convergence').textContent = result.converged ? '✓ 수렴' : '✗ 미수렴';
            document.getElementById('convergence').style.color = result.converged ? '#28a745' : '#dc3545';
        }
        
        // 차트 그리기
        function drawCharts() {
            drawEquilibriumPath();
            drawStructure();
        }
        
        // 평형 경로 그리기
        function drawEquilibriumPath() {
            const ctx = eqCtx;
            const width = eqCanvas.width;
            const height = eqCanvas.height;
            const padding = 60;
            
            // 배경
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            // 이론적 평형 경로 (참조용)
            // λ = R_int(u) = k·u - k·0.1·u^3
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            const numPoints = 200;
            for (let i = 0; i <= numPoints; i++) {
                const u = -3 + (i / numPoints) * 6;
                const lambda = internalForce(u, params.stiffness);
                
                const x = padding + ((u + 3) / 6) * (width - 2 * padding);
                const y = height - padding - (lambda / 3) * (height - 2 * padding);
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Arc-Length 해석 경로
            if (solutionPath.length > 1) {
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 3;
                ctx.beginPath();
                
                for (let i = 0; i < solutionPath.length; i++) {
                    const point = solutionPath[i];
                    const x = padding + ((point.u + 3) / 6) * (width - 2 * padding);
                    const y = height - padding - (point.lambda / 3) * (height - 2 * padding);
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                
                // 포인트 마커
                solutionPath.forEach((point, idx) => {
                    const x = padding + ((point.u + 3) / 6) * (width - 2 * padding);
                    const y = height - padding - (point.lambda / 3) * (height - 2 * padding);
                    
                    ctx.fillStyle = idx === solutionPath.length - 1 ? '#f5576c' : '#667eea';
                    ctx.beginPath();
                    ctx.arc(x, y, idx === solutionPath.length - 1 ? 6 : 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
            
            // 축
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(padding, padding);
            ctx.stroke();
            
            // 레이블
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('변위 (u)', width / 2, height - 20);
            
            ctx.save();
            ctx.translate(20, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('하중 계수 (λ)', 0, 0);
            ctx.restore();
            
            // 제목
            ctx.font = 'bold 18px Arial';
            ctx.fillText('평형 경로 (u-λ 곡선)', width / 2, 30);
            
            // 눈금
            ctx.font = '12px Arial';
            ctx.fillStyle = '#666';
            for (let i = 0; i <= 6; i++) {
                const u = -3 + i;
                const x = padding + (i / 6) * (width - 2 * padding);
                ctx.fillText(u.toFixed(0), x, height - padding + 20);
            }
            
            for (let i = 0; i <= 3; i++) {
                const lambda = i;
                const y = height - padding - (i / 3) * (height - 2 * padding);
                ctx.textAlign = 'right';
                ctx.fillText(lambda.toFixed(0), padding - 10, y + 5);
            }
        }
        
        // 구조물 그리기 (얕은 아치 모델)
        function drawStructure() {
            const ctx = strCtx;
            const width = strCanvas.width;
            const height = strCanvas.height;
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            const centerX = width / 2;
            const centerY = height / 2;
            const span = 300;
            const rise0 = 50; // 초기 상승높이
            
            // 지지점
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(centerX - span/2, centerY + rise0);
            ctx.lineTo(centerX - span/2 - 10, centerY + rise0 + 20);
            ctx.lineTo(centerX - span/2 + 10, centerY + rise0 + 20);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(centerX + span/2, centerY + rise0);
            ctx.lineTo(centerX + span/2 - 10, centerY + rise0 + 20);
            ctx.lineTo(centerX + span/2 + 10, centerY + rise0 + 20);
            ctx.closePath();
            ctx.fill();
            
            // 초기 형상 (점선)
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            
            for (let i = 0; i <= 50; i++) {
                const t = i / 50;
                const x = centerX - span/2 + t * span;
                const y = centerY + rise0 - rise0 * 4 * t * (1 - t);
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 변형 형상
            const u_displacement = currentState.u * 30; // 스케일링
            
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 4;
            ctx.beginPath();
            
            for (let i = 0; i <= 50; i++) {
                const t = i / 50;
                const x = centerX - span/2 + t * span;
                const y = centerY + rise0 - rise0 * 4 * t * (1 - t) + u_displacement * (1 - 4 * Math.pow(t - 0.5, 2));
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // 하중 화살표
            if (currentState.lambda > 0) {
                const arrowY = centerY + rise0 - rise0 + u_displacement - 50;
                const arrowLength = Math.min(currentState.lambda * 30, 100);
                
                ctx.strokeStyle = '#f5576c';
                ctx.fillStyle = '#f5576c';
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.moveTo(centerX, arrowY);
                ctx.lineTo(centerX, arrowY + arrowLength);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(centerX, arrowY + arrowLength);
                ctx.lineTo(centerX - 8, arrowY + arrowLength - 15);
                ctx.lineTo(centerX + 8, arrowY + arrowLength - 15);
                ctx.closePath();
                ctx.fill();
                
                ctx.font = 'bold 14px Arial';
                ctx.fillText(`P = ${currentState.lambda.toFixed(2)}`, centerX + 30, arrowY + arrowLength/2);
            }
            
            // 제목
            ctx.fillStyle = '#333';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('구조물 변형 형상 (얕은 아치)', centerX, 30);
            
            // 변위 표시
            ctx.font = '14px Arial';
            ctx.fillText(`중앙 변위: ${currentState.u.toFixed(3)}`, centerX, height - 20);
        }
        
        // 초기화
        resetAnalysis();
    </script>
</body>
